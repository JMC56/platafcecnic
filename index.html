<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Plataforma Estudiantil · Login</title>
<meta name="color-scheme" content="light">

<style>
:root {
    --azul: #1d4ed8;
    --azul-oscuro: #0b1f4d;
    --azul-medio: #2563eb;
    --azul-suave: #dbeafe;
    --azul-claro: #eff6ff;
    --blanco: #ffffff;
    --texto: #0f172a;
    --muted: #5b6b85;
    --borde: #bfdbfe;
    --shadow: 0 24px 70px rgba(11, 31, 77, .16);
    --shadow-soft: 0 12px 30px rgba(29, 78, 216, .10);
    --ok: #16a34a;
    --bad: #dc2626;
    --focus: rgba(37, 99, 235, .18);
    --radius: 28px;
}

* { box-sizing: border-box; }
html, body { min-height: 100%; }

body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--texto);
    background: 
        radial-gradient(circle at top left, rgba(59, 130, 246, .16), transparent 25%),
        radial-gradient(circle at top right, rgba(29, 78, 216, .14), transparent 28%),
        linear-gradient(145deg, #eff6ff 0%, #dbeafe 45%, #eef4ff 100%);
}

.bg-dots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .22;
    background-image: radial-gradient(circle, rgba(29, 78, 216, .35) 1.1px, transparent 1.1px);
    background-size: 32px 32px;
}

.wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
}

.shell {
    width: min(1280px, 100%);
    background: rgba(255, 255, 255, .62);
    border: 1px solid rgba(255, 255, 255, .72);
    backdrop-filter: blur(10px);
    border-radius: 34px;
    box-shadow: var(--shadow);
    overflow: hidden;
}

.hero {
    padding: 32px;
    background: linear-gradient(135deg, #0b1f4d, #1d4ed8);
    color: white;
}

.hero-grid {
    display: grid;
    grid-template-columns: 1.2fr .7fr;
    gap: 26px;
}

.hero-title { font-size: 56px; font-weight: 900; }

.hero-right {
    background: rgba(255, 255, 255, .12);
    padding: 22px;
    border-radius: 26px;
}

.hero-info {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.hero-box {
    padding: 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, .1);
}

.content {
    padding: 26px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 20px;
}

.panel {
    background: white;
    border-radius: 28px;
    padding: 24px;
}

.login-card {
    background: white;
    border-radius: 28px;
    padding: 24px;
}

.input {
    width: 100%;
    margin-top: 6px;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid var(--borde);
}

.btn {
    border: none;
    padding: 14px;
    border-radius: 18px;
    background: linear-gradient(135deg, #1d4ed8, #0b1f4d);
    color: white;
    font-weight: 900;
    cursor: pointer;
}

.msg { margin-top: 14px; font-weight: 700; }
.msg.good { color: var(--ok); }
.msg.bad { color: var(--bad); }
</style>
</head>

<body>

<div class="bg-dots"></div>

<div class="wrap">
<div class="shell">

<section class="hero">
<div class="hero-grid">
<div>
<h1 class="hero-title">PLATAFORMA<br>ESTUDIANTIL</h1>
</div>

<div class="hero-right">
<div>Bienvenido</div>

<div class="hero-info">
<div class="hero-box">
<small>Fecha</small>
<strong id="currentDate"></strong>
</div>

<div class="hero-box">
<small>Estado</small>
<strong id="statusChip">Cargando...</strong>
</div>
</div>
</div>
</div>
</section>

<section class="content">

<div class="panel">
<h2>Bienvenidos</h2>
</div>

<div class="login-card">
<h1>Iniciar sesión</h1>

<input id="email" class="input" type="email" placeholder="Correo">
<input id="pass" class="input" type="password" placeholder="Contraseña">

<button id="loginBtn" class="btn">ENTRAR</button>

<div id="msg" class="msg"></div>
</div>

</section>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCygD9ISTn-mqAt5WacS1aIAVb1TunoG00",
  authDomain: "plataformacecnic.firebaseapp.com",
  projectId: "plataformacecnic"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const $ = id => document.getElementById(id);

$("currentDate").textContent = new Date().toLocaleDateString("es-NI");

async function login(){

const email = $("email").value.trim();
const pass = $("pass").value;

if(!email || !pass){
$("msg").textContent = "Completa los campos";
return;
}

$("msg").textContent = "Verificando...";

try{

await signInWithEmailAndPassword(auth,email,pass);

$("msg").textContent = "Acceso concedido";
$("msg").className = "msg good";

setTimeout(()=>{
location.href="dashboard.html";
},700);

}catch(e){

$("msg").textContent = "Credenciales incorrectas";
$("msg").className = "msg bad";

}

}

$("loginBtn").onclick = login;

</script>

</body>
</html>

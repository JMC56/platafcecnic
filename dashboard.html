<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>Dashboard CECNIC - Sistema Integral</title>
  <meta name="color-scheme" content="light">
  <style>
    :root{
      --azul:#1d4ed8;
      --azul-oscuro:#0b1f4d;
      --azul-medio:#2563eb;
      --azul-suave:#dbeafe;
      --azul-claro:#eff6ff;
      --blanco:#ffffff;
      --texto:#0f172a;
      --muted:#60708e;
      --borde:#bfdbfe;
      --shadow:0 24px 70px rgba(11,31,77,.14);
      --ok:#16a34a;
      --bad:#dc2626;
      --focus:rgba(37,99,235,.18);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{min-height:100%; margin:0; font-family: ui-sans-serif, system-ui, sans-serif;}

    body{
      background: radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 25%),
                  linear-gradient(145deg, #eff6ff 0%, #dbeafe 45%, #eef4ff 100%);
      color: var(--texto);
      overflow-x: hidden;
    }

    .bg-dots{
      position:fixed; inset:0; pointer-events:none; opacity:.18;
      background-image: radial-gradient(circle, rgba(29,78,216,.35) 1.1px, transparent 1.1px);
      background-size: 32px 32px; z-index:0;
    }

    .layout{ position:relative; z-index:1; display:grid; gap:18px; padding:16px; }

    .glass{ background: rgba(255,255,255,.78); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,.65); box-shadow: var(--shadow); border-radius: 30px; }

    /* HERO */
    .hero{ padding:28px; background: linear-gradient(135deg, #0b1f4d 0%, #1d4ed8 100%); color:#fff; position:relative; overflow:hidden; }
    .hero-grid{ display:grid; grid-template-columns: 1.1fr 0.9fr; gap:22px; align-items:center; position:relative; z-index:2; }
    .hero h1{ font-size: clamp(30px, 5vw, 50px); margin:0; font-weight:900; line-height:1; }
    .hero-side{ background: rgba(255,255,255,0.1); border-radius: 20px; padding:20px; border: 1px solid rgba(255,255,255,0.2); }
    .hero-box{ background:rgba(255,255,255,.08); padding:12px; border-radius:15px; border:1px solid rgba(255,255,255,.1); }

    /* SECTIONS */
    .content{ display:grid; grid-template-columns: 320px 1fr; gap:18px; }
    .panel-head{ padding:20px; border-bottom: 1px solid var(--borde); }
    .who{ display:flex; align-items:center; justify-content:space-between; background:#fff; padding:12px; border-radius:20px; margin-top:10px; border:1px solid var(--borde); }

    /* BUTTONS */
    .btn{ border:0; cursor:pointer; padding:12px 18px; border-radius:15px; font-weight:700; transition: .2s; }
    .btn.primary{ background: var(--azul); color:#fff; }
    .btn.ghost{ background:#fff; color: var(--azul-oscuro); border:1px solid var(--borde); }
    .btn.danger{ background:#fff1f2; color:#b42318; border:1px solid #fecdd3; }
    .btn:hover{ transform: translateY(-2px); filter: brightness(1.1); }

    /* CARDS & GRID */
    .gridCards{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:18px; margin-top:20px; }
    .cardPost{ background:#fff; padding:15px; border-radius:22px; border:1px solid var(--borde); }
    .postImg{ width:100%; border-radius:15px; margin-top:10px; object-fit:cover; max-height:250px; }

    /* MODALS */
    .modal{ position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(5px); display:none; place-items:center; z-index:100; padding:20px; }
    .modal.show{ display:grid; }
    .paper{ background:#fff; width:100%; max-width:500px; border-radius:25px; overflow:hidden; box-shadow: var(--shadow); }
    .paperTop{ padding:15px 20px; background: var(--azul-claro); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--borde); }
    .paperBody{ padding:20px; }
    .input, .area{ width:100%; padding:12px; border-radius:12px; border:1px solid var(--borde); margin-bottom:10px; outline:none; }

    /* UTILS */
    .badge{ background: var(--bad); color:white; padding:2px 8px; border-radius:10px; font-size:11px; }

    @media (max-width: 900px) { .content, .hero-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-dots"></div>

  <div class="layout">
    <section class="hero glass">
      <div class="hero-grid">
        <div>
          <p style="letter-spacing:4px; font-size:12px;">CECNIC ONLINE</p>
          <h1>DASHBOARD<br>ADMINISTRATIVO</h1>
          <p>Gestión de servicios, usuarios y avisos en tiempo real.</p>
        </div>
        <div class="hero-side">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="hero-box"><small>Usuario</small><br><strong id="nameHero">—</strong></div>
            <div class="hero-box"><small>Rol</small><br><strong id="roleHero">—</strong></div>
          </div>
          <button class="btn ghost" style="width:100%; margin-top:15px;" onclick="document.getElementById('modalPass').classList.add('show')">Cambiar Contraseña</button>
        </div>
      </div>
    </section>

    <section class="content">
      <aside class="glass">
        <div class="panel-head">
          <h2 style="margin:0; font-size:20px;">Menú Principal</h2>
          <div class="who">
            <span id="nameUser" style="font-weight:700; font-size:14px;">—</span>
            <button class="btn danger" id="btnLogout" style="padding:5px 10px; font-size:12px;">Salir</button>
          </div>
        </div>
        <div style="padding:20px;">
          <h4 style="margin:0 0 10px;">Mis Cursos</h4>
          <div id="courseList" style="display:grid; gap:8px;"></div>
          
          <hr style="border:0; border-top:1px solid var(--borde); margin:20px 0;">
          
          <button class="btn ghost" style="width:100%; text-align:left; display:flex; justify-content:space-between;" onclick="alert('Abriendo bandeja de solicitudes...')">
            📥 Inbox Solicitudes <span class="badge" id="inboxCount">0</span>
          </button>
        </div>
      </aside>

      <main class="glass" style="padding:25px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
          <h3 style="margin:0; font-size:32px; font-weight:900;">Avisos Recientes</h3>
          <div id="adminTools" style="display:none; gap:10px;">
            <button class="btn ghost" onclick="document.getElementById('modalUser').classList.add('show')">+ Usuario</button>
            <button class="btn primary" onclick="document.getElementById('modalPost').classList.add('show')">+ Nuevo Aviso</button>
          </div>
        </div>

        <div class="gridCards" id="dashPosts"></div>
      </main>
    </section>
  </div>

  <div class="modal" id="modalPost">
    <div class="paper">
      <div class="paperTop"><strong>Crear Aviso</strong><button class="btn" onclick="this.closest('.modal').classList.remove('show')">X</button></div>
      <div class="paperBody">
        <input class="input" id="postTitle" placeholder="Título">
        <textarea class="area" id="postBody" placeholder="Mensaje..." rows="4"></textarea>
        <input class="input" id="postImg" placeholder="URL de la imagen">
        <button class="btn primary" style="width:100%;" id="btnSavePost">Publicar en Dashboard</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modalUser">
    <div class="paper">
      <div class="paperTop"><strong>Nuevo Usuario</strong><button class="btn" onclick="this.closest('.modal').classList.remove('show')">X</button></div>
      <div class="paperBody">
        <input class="input" id="regEmail" placeholder="Correo electrónico">
        <input class="input" id="regPass" type="password" placeholder="Contraseña temporal">
        <select class="input" id="regRole">
          <option value="estudiante">Estudiante</option>
          <option value="maestro">Maestro</option>
          <option value="administrador">Administrador</option>
        </select>
        <button class="btn primary" style="width:100%;" id="btnCreateUser">Registrar en Firebase</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modalPass">
    <div class="paper">
      <div class="paperTop"><strong>Seguridad</strong><button class="btn" onclick="this.closest('.modal').classList.remove('show')">X</button></div>
      <div class="paperBody">
        <input class="input" id="oldPass" type="password" placeholder="Contraseña actual">
        <input class="input" id="newPass" type="password" placeholder="Nueva contraseña">
        <button class="btn primary" style="width:100%;" id="btnUpdatePass">Actualizar Contraseña</button>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, updatePassword, reauthenticateWithCredential, EmailAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCygD9ISTn-mqAt5WacS1aIAVb1TunoG00",
    authDomain: "plataformacecnic.firebaseapp.com",
    projectId: "plataformacecnic",
    storageBucket: "plataformacecnic.firebasestorage.app",
    messagingSenderId: "1053875195363",
    appId: "1:1053875195363:web:57be5f3ff586466ea7a4d6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const email = (localStorage.getItem("session_email") || "").toLowerCase();
  const role = localStorage.getItem("session_role") || "estudiante";

  // PROTECCIÓN DE RUTA
  if(!email) window.location.href = "index.html";

  // UI INITIAL LOAD
  document.getElementById("nameHero").textContent = email.split('@')[0];
  document.getElementById("roleHero").textContent = role.toUpperCase();
  document.getElementById("nameUser").textContent = email;
  
  if(role === "administrador" || role === "maestro") {
    document.getElementById("adminTools").style.display = "flex";
  }

  // --- GESTIÓN DE AVISOS (FIREBASE) ---
  const postCol = collection(db, "dashboard_posts");
  
  document.getElementById("btnSavePost").onclick = async () => {
    const t = document.getElementById("postTitle").value;
    const b = document.getElementById("postBody").value;
    const i = document.getElementById("postImg").value;
    if(!t || !b) return alert("Completa los campos");
    
    await addDoc(postCol, { title: t, body: b, imageUrl: i, createdAt: serverTimestamp() });
    document.getElementById("modalPost").classList.remove("show");
  };

  onSnapshot(query(postCol, orderBy("createdAt", "desc")), (snap) => {
    const wrap = document.getElementById("dashPosts");
    wrap.innerHTML = "";
    snap.forEach(d => {
      const p = d.data();
      wrap.innerHTML += `
        <div class="cardPost">
          <div style="display:flex; justify-content:space-between;">
            <strong style="color:var(--azul-oscuro); font-size:18px;">${p.title}</strong>
            ${role === 'administrador' ? `<button onclick="window.delPost('${d.id}')" style="border:0; background:none; cursor:pointer;">🗑️</button>` : ''}
          </div>
          <p style="color:var(--muted); font-size:14px; margin:10px 0;">${p.body}</p>
          ${p.imageUrl ? `<img src="${p.imageUrl}" class="postImg">` : ''}
        </div>
      `;
    });
  });

  window.delPost = async (id) => { if(confirm("¿Borrar aviso?")) await deleteDoc(doc(db, "dashboard_posts", id)); };

  // --- GESTIÓN DE USUARIOS ---
  document.getElementById("btnCreateUser").onclick = async () => {
    const e = document.getElementById("regEmail").value;
    const p = document.getElementById("regPass").value;
    const r = document.getElementById("regRole").value;
    
    try {
      await createUserWithEmailAndPassword(auth, e, p);
      await addDoc(collection(db, "users_roles"), { email: e.toLowerCase(), role: r });
      alert("Usuario creado en Firebase!");
      document.getElementById("modalUser").classList.remove("show");
    } catch(err) { alert("Error: " + err.message); }
  };

  // --- CAMBIO DE CONTRASEÑA ---
  document.getElementById("btnUpdatePass").onclick = async () => {
    const user = auth.currentUser;
    const oldP = document.getElementById("oldPass").value;
    const newP = document.getElementById("newPass").value;
    const credential = EmailAuthProvider.credential(user.email, oldP);

    try {
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newP);
      alert("Contraseña actualizada correctamente");
      document.getElementById("modalPass").classList.remove("show");
    } catch(err) { alert("Error: Revisa tu contraseña actual"); }
  };

  // --- SOLICITUDES INBOX ---
  onSnapshot(query(collection(db, "solicitudes"), where("status", "==", "pendiente")), (snap) => {
    document.getElementById("inboxCount").textContent = snap.size;
  });

  // --- CURSOS FILTRADOS ---
  async function loadCourses() {
    try {
      const resp = await fetch("courses.json");
      const data = await resp.json();
      const wrap = document.getElementById("courseList");
      const visible = (role === 'administrador') ? data.courses : data.courses.filter(c => c.allowedEmails.includes(email));
      
      visible.forEach(c => {
        wrap.innerHTML += `<a href="${c.page}" class="btn ghost" style="text-decoration:none; font-size:13px;">📘 ${c.name}</a>`;
      });
    } catch(e) { console.log("Error cargando cursos"); }
  }
  loadMyCourses();

  // LOGOUT
  document.getElementById("btnLogout").onclick = () => {
    localStorage.clear();
    signOut(auth).then(() => window.location.href = "index.html");
  };
</script>
</body>
</html>
